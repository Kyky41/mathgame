name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev build-essential git wget unzip

    - name: 安装 Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install cython buildozer

    - name: 接受 SDK 许可证（使用预装 SDK 的 sdkmanager）
      run: |
        SDK_MANAGER=$(find /usr/local/lib/android/sdk -name sdkmanager -type f 2>/dev/null | head -1)
        if [ -z "$SDK_MANAGER" ]; then
          echo "sdkmanager not found, trying default path"
          SDK_MANAGER=/usr/local/lib/android/sdk/tools/bin/sdkmanager
        fi
        echo "Using sdkmanager: $SDK_MANAGER"
        yes | $SDK_MANAGER --licenses || true

    - name: 执行打包（Buildozer 将使用预装 SDK/NDK）
      run: |
        unset ANDROIDNDK
        unset ANDROIDSDK
        buildozer -v android debug

    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: mathgame-apk
        path: ./bin/*.apk
