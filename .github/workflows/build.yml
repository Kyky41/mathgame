name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev build-essential git wget unzip

    - name: 安装 Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install cython buildozer

    - name: 诊断环境
      run: |
        echo "=== 环境诊断 ==="
        echo "当前用户: $(whoami)"
        echo "HOME: $HOME"
        echo "ANDROIDNDK: $ANDROIDNDK"
        echo "ANDROIDSDK: $ANDROIDSDK"
        echo "ANDROIDAPI: $ANDROIDAPI"
        echo "ANDROIDMINAPI: $ANDROIDMINAPI"
        echo ""
        echo "=== buildozer.spec 中的关键配置 ==="
        grep -E "android\.ndk|android\.api|android\.sdk|p4a\." buildozer.spec | grep -v "^#"
        echo ""
        echo "=== 检查硬编码路径 ==="
        grep -n "asu_qin" buildozer.spec || echo "未找到硬编码路径"

    - name: 清除 Android 环境变量
      run: |
        unset ANDROIDNDK
        unset ANDROIDSDK
        unset ANDROIDAPI
        unset ANDROIDMINAPI
        echo "ANDROIDNDK=" >> $GITHUB_ENV
        echo "ANDROIDSDK=" >> $GITHUB_ENV
        echo "ANDROIDAPI=" >> $GITHUB_ENV
        echo "ANDROIDMINAPI=" >> $GITHUB_ENV
        echo "已清除所有 ANDROID 环境变量"

    - name: 执行打包
      run: |
        export ANDROIDNDK=""
        export ANDROIDSDK=""
        export ANDROIDAPI=""
        export ANDROIDMINAPI=""
        buildozer android debug

    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: mathgame-apk
        path: ./bin/*.apk
