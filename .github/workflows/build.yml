name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev build-essential git wget unzip

    - name: 安装 Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install cython buildozer

    - name: 🔍 详细诊断 SDK 环境
      run: |
        echo "=========================================="
        echo "      Android SDK 环境诊断"
        echo "=========================================="
        echo "当前用户: $(whoami)"
        echo "HOME: $HOME"
        echo ""
        echo "1. 预装 SDK 路径: /usr/local/lib/android/sdk"
        ls -la /usr/local/lib/android/sdk || echo "目录不存在"
        echo ""
        echo "2. 查找所有可能的 sdkmanager:"
        find /usr/local/lib/android/sdk -name sdkmanager -type f 2>/dev/null
        echo ""
        echo "3. 查找所有可能的 build-tools:"
        find /usr/local/lib/android/sdk -type d -name "build-tools" 2>/dev/null
        echo ""
        echo "4. 环境变量检查:"
        env | grep -E "ANDROID|SDK|NDK" | sort
        echo "=========================================="

    - name: 配置 SDK 路径并安装 build-tools
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724

        # 查找 sdkmanager
        SDKMANAGER=$(find $ANDROID_HOME -name sdkmanager -type f 2>/dev/null | head -1)
        if [ -z "$SDKMANAGER" ]; then
          echo "❌ sdkmanager 未找到！"
          exit 1
        else
          echo "✅ 找到 sdkmanager: $SDKMANAGER"
          # 如果 sdkmanager 在 cmdline-tools 下，创建符号链接以便 Buildozer 识别
          if [[ "$SDKMANAGER" == *"cmdline-tools"* ]]; then
            echo "创建符号链接: $ANDROID_HOME/tools/bin/sdkmanager -> $SDKMANAGER"
            mkdir -p $ANDROID_HOME/tools/bin
            ln -sf $SDKMANAGER $ANDROID_HOME/tools/bin/sdkmanager
          fi
        fi

        # 设置环境变量
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
        unset ANDROIDNDK
        unset ANDROIDSDK

        # 接受许可证
        echo "接受 SDK 许可证..."
        yes | $SDKMANAGER --licenses || true

        # 检查并安装 build-tools
        if [ ! -d "$ANDROID_HOME/build-tools" ] || [ -z "$(ls -A $ANDROID_HOME/build-tools 2>/dev/null)" ]; then
          echo "安装 build-tools;30.0.3"
          yes | $SDKMANAGER "build-tools;30.0.3"
        else
          echo "build-tools 已存在"
          ls -la $ANDROID_HOME/build-tools/
        fi

        # 验证 aidl
        aidl_path=$(find $ANDROID_HOME/build-tools -name aidl -type f 2>/dev/null | head -1)
        if [ -n "$aidl_path" ]; then
          echo "✅ aidl 找到: $aidl_path"
        else
          echo "❌ aidl 未找到，尝试安装 build-tools;34.0.0"
          yes | $SDKMANAGER "build-tools;34.0.0"
        fi

    - name: 执行打包
      run: buildozer -v android debug

    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: mathgame-apk
        path: ./bin/*.apk
