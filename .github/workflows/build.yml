name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev build-essential git wget unzip

    - name: 安装 Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install cython buildozer

    - name: 配置 Android SDK 并安装 build-tools
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724

        # 查找 sdkmanager
        SDKMANAGER=$(find $ANDROID_HOME -name sdkmanager -type f 2>/dev/null | head -1)
        if [ -z "$SDKMANAGER" ]; then
          echo "sdkmanager not found, trying default path"
          SDKMANAGER=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER=$ANDROID_HOME/tools/bin/sdkmanager
          fi
        fi
        echo "Using sdkmanager: $SDKMANAGER"

        # 接受所有 SDK 许可证
        yes | $SDKMANAGER --licenses || true

        # 安装 build-tools 37.0.0（包含 aidl）
        yes | $SDKMANAGER "build-tools;37.0.0"

        # 设置环境变量供后续步骤使用
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV

    - name: 执行打包
      run: |
        unset ANDROIDNDK
        unset ANDROIDSDK
        buildozer -v android debug

    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: mathgame-apk
        path: ./bin/*.apk
