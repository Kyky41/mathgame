name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev build-essential git wget unzip

    - name: 安装 Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install cython buildozer

    - name: 手动准备 NDK
      run: |
        mkdir -p /home/runner/.buildozer/android/platform
        cd /home/runner/.buildozer/android/platform
        if [ ! -d "android-ndk-r28c" ]; then
          echo "下载 NDK..."
          wget -q https://dl.google.com/android/repository/android-ndk-r28c-linux.zip
          echo "解压 NDK..."
          unzip -q android-ndk-r28c-linux.zip
          rm android-ndk-r28c-linux.zip
        else
          echo "NDK 已存在"
        fi
        # 设置环境变量供 Buildozer 使用
        echo "ANDROIDNDK=/home/runner/.buildozer/android/platform/android-ndk-r28c" >> $GITHUB_ENV
        echo "ANDROIDSDK=/home/runner/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV

    - name: 执行打包
      run: |
        # 确保环境变量传递
        export ANDROIDNDK="$ANDROIDNDK"
        export ANDROIDSDK="$ANDROIDSDK"
        buildozer android debug

    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: mathgame-apk
        path: ./bin/*.apk
