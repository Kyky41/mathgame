name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev build-essential git wget unzip

    - name: 安装 Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install cython buildozer

    - name: 设置 SDK/NDK 环境并安装 build-tools
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
        unset ANDROIDNDK
        unset ANDROIDSDK

        # 查找 sdkmanager
        SDKMANAGER=$(find $ANDROID_HOME -name sdkmanager -type f 2>/dev/null | head -1)
        if [ -z "$SDKMANAGER" ]; then
          echo "❌ sdkmanager 未找到"
          exit 1
        fi
        echo "✅ sdkmanager: $SDKMANAGER"

        # 创建符号链接
        mkdir -p $ANDROID_HOME/tools/bin
        ln -sf $SDKMANAGER $ANDROID_HOME/tools/bin/sdkmanager

        # 接受许可证
        yes | $SDKMANAGER --licenses || true

        # 安装 build-tools 30.0.3
        yes | $SDKMANAGER "build-tools;30.0.3"

        # 验证 aidl
        if [ -f "$ANDROID_HOME/build-tools/30.0.3/aidl" ]; then
          echo "✅ aidl 已安装"
        else
          echo "❌ aidl 未找到，尝试安装 34.0.0"
          yes | $SDKMANAGER "build-tools;34.0.0"
        fi

    - name: 手动运行 p4a create（获取详细错误）
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724
        unset ANDROIDNDK
        unset ANDROIDSDK

        # 构建 p4a 命令
        P4A_CMD="python -m pythonforandroid.toolchain create \
          --dist_name=mathgame \
          --bootstrap=sdl2 \
          --requirements=hostpython3==3.10.11,python3==3.10.11,cython,pygame==2.5.2 \
          --arch=arm64-v8a \
          --arch=armeabi-v7a \
          --copy-libs \
          --storage-dir=/home/runner/work/mathgame/mathgame/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a \
          --ndk-api=21 \
          --ignore-setup-py \
          --debug"

        echo "执行 p4a 创建命令..."
        $P4A_CMD 2>&1 | tee p4a_output.log
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "p4a 创建失败，查看日志："
          tail -100 p4a_output.log
          exit 1
        fi

    - name: 执行 Buildozer 打包
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724
        unset ANDROIDNDK
        unset ANDROIDSDK
        buildozer -v android debug

    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: mathgame-apk
        path: ./bin/*.apk
