name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev build-essential git wget unzip

    - name: 安装 Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install cython buildozer

    - name: 手动安装 python-for-android 及其依赖
      run: |
        git clone https://github.com/kivy/python-for-android.git ~/p4a
        SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
        cp -r ~/p4a/pythonforandroid $SITE_PACKAGES/
        # 安装 p4a 运行时依赖
        pip install appdirs colorama jinja2 sh meson ninja build toml packaging setuptools wheel

    - name: 设置 SDK/NDK 环境并创建符号链接
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
        unset ANDROIDNDK
        unset ANDROIDSDK

        SDKMANAGER=$(find $ANDROID_HOME -name sdkmanager -type f 2>/dev/null | head -1)
        if [ -z "$SDKMANAGER" ]; then
          echo "❌ sdkmanager 未找到"
          exit 1
        fi
        echo "✅ sdkmanager: $SDKMANAGER"
        mkdir -p $ANDROID_HOME/tools/bin
        ln -sf $SDKMANAGER $ANDROID_HOME/tools/bin/sdkmanager

        yes | $SDKMANAGER --licenses || true
        yes | $SDKMANAGER "build-tools;30.0.3"

    - name: 使用 p4a 创建 dist（绕过 Buildozer）
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724
        unset ANDROIDNDK
        unset ANDROIDSDK

        python -m pythonforandroid.toolchain create \
          --dist_name=mathgame \
          --bootstrap=sdl2 \
          --requirements=hostpython3==3.10.11,python3==3.10.11,cython,pygame==2.5.2 \
          --arch=arm64-v8a \
          --arch=armeabi-v7a \
          --copy-libs \
          --storage-dir=/home/runner/work/mathgame/mathgame/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a \
          --ndk-api=21 \
          --ignore-setup-py \
          --debug

    - name: 执行 Buildozer 打包（复用已创建的 dist）
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724
        unset ANDROIDNDK
        unset ANDROIDSDK
        buildozer android debug

    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: mathgame-apk
        path: ./bin/*.apk
