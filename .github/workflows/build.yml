name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev build-essential git wget unzip

    - name: 安装 Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install cython buildozer

    - name: 强制使用预装 SDK/NDK 并安装 build-tools
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
        unset ANDROIDNDK
        unset ANDROIDSDK
        SDKMANAGER=$(find $ANDROID_HOME -name sdkmanager -type f 2>/dev/null | head -1)
        if [ -z "$SDKMANAGER" ]; then
          SDKMANAGER=$ANDROID_HOME/tools/bin/sdkmanager
        fi
        echo "Using sdkmanager: $SDKMANAGER"
        # 接受所有许可证
        yes | $SDKMANAGER --licenses || true
        # 检查已安装的 build-tools，若没有则安装 30.0.3
        if [ ! -d "$ANDROID_HOME/build-tools" ] || [ -z "$(ls -A $ANDROID_HOME/build-tools)" ]; then
          echo "build-tools 不存在，安装 30.0.3"
          yes | $SDKMANAGER "build-tools;30.0.3"
        else
          echo "build-tools 已存在，跳过安装"
        fi
        # 验证 aidl 存在
        ls -l $ANDROID_HOME/build-tools/*/aidl || echo "aidl 未找到"

    - name: 执行打包
      run: buildozer -v android debug

    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: mathgame-apk
        path: ./bin/*.apk
