name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev build-essential git wget unzip

    - name: 安装 Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install cython buildozer

    - name: 预装 build-tools 并创建符号链接
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
        unset ANDROIDNDK
        unset ANDROIDSDK

        SDKMANAGER=$(find $ANDROID_HOME -name sdkmanager -type f 2>/dev/null | head -1)
        if [ -z "$SDKMANAGER" ]; then
          echo "❌ sdkmanager 未找到"
          exit 1
        fi
        echo "✅ sdkmanager: $SDKMANAGER"
        mkdir -p $ANDROID_HOME/tools/bin
        ln -sf $SDKMANAGER $ANDROID_HOME/tools/bin/sdkmanager

        yes | $SDKMANAGER --licenses || true
        yes | $SDKMANAGER "build-tools;30.0.3"

    - name: 执行打包并捕获完整日志
      run: |
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724
        unset ANDROIDNDK
        unset ANDROIDSDK
        buildozer -v android debug 2>&1 | tee build.log
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "=== Buildozer 失败，完整日志如下 ==="
          cat build.log
          exit 1
        fi

    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: mathgame-apk
        path: ./bin/*.apk
